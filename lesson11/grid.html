<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">

    <style>

        body {
            background-color: #c8c8c8;
        }
        .ujrebi {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    padding: 10px;
}

.ujrebi div {
    background-color: #f1f1f1;
    border: 2px solid rgb(134, 134, 134);
    color: rgb(134, 134, 134);;
    padding: 10px;
    font-size: 30px;
    text-align: center;
    margin: 10px;
    height: 100px;
}

::selection {
    background-color: red;
}

.ujrebi div.wide {
    grid-column: span 2;
}
p {
    text-align: center;
    font-size: xx-large;
    font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
    color: rgb(134, 134, 134);
}




    </style>
</head>
<body>
    <p>grid</p>

    <div class="ujrebi">
        <div class="wide"> 1 ujra </div>
        <div> 2 ujra </div>
        
        <div> 3 ujra </div>
        <div class="wide"> 4 ujra </div>
        
        <div class="wide"> 5 ujra </div>
        <div> 6 ujra </div>
    </div>
    
</body>
</html>
